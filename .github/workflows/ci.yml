name: CI

# Run on every push to any branch (so your feature-branch work is tested
# immediately, no PR needed), and on PRs into main.
on:
  push:
  pull_request:
    branches: [ main ]

jobs:
  backend-tests:
    name: Backend tests
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend
    steps:
      - name: Check out code
        uses: actions/checkout@v4

      - name: Set up Java 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '21'
          cache: maven

      # The repo is developed on Windows, so the mvnw script may not be
      # marked executable on Linux. This guarantees it can run.
      - name: Make mvnw executable
        run: chmod +x mvnw

      - name: Build and run tests
        run: ./mvnw --batch-mode verify