name: CI

on:
  pull_request:
    branches: [main, dev]
  push:
    branches: [main, dev]

jobs:
  test:
    name: Run Tests
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Java 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'
          cache: maven

      - name: Run tests
        working-directory: backend
        run: ./mvnw test

      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-results
          path: backend/target/surefire-reports/*.xml

  docker-build:
    name: Build Docker Images
    runs-on: ubuntu-latest
    needs: test

    steps:
      - uses: actions/checkout@v4

      - name: Build backend image
        run: docker build ./backend -t banking-backend:ci

      - name: Build frontend image
        run: docker build ./frontend -t banking-frontend:ci

      - name: Verify containers start
        run: |
          docker run -d --name backend-test \
            -e H2_DB_PATH=/tmp/bankingdb \
            -e JWT_SECRET=dGVzdHNlY3JldGtleWZvcmNpdGVzdGluZ29ubHk= \
            -p 8080:8080 \
            banking-backend:ci
          sleep 10
          docker ps | grep backend-test
          docker logs backend-test
          docker stop backend-test
