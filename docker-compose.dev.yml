services:
  backend:
    image: maven:3.9.9-eclipse-temurin-21
    working_dir: /app
    command: mvn spring-boot:run
    restart: unless-stopped
    environment:
      H2_DB_PATH: /app/data/bankingdb
    ports:
      - "8080:8080"
    volumes:
      - ./backend:/app
      - maven_cache:/root/.m2
      - backend_h2_data:/app/data

  frontend:
    image: node:20-alpine
    container_name: banking-frontend-dev
    working_dir: /app
    command: sh -c "npm install --legacy-peer-deps && npm run dev -- --host 0.0.0.0"
    restart: unless-stopped
    environment:
      VITE_API_URL: http://backend:8080
    ports:
      - "5173:5173"
    volumes:
      - ./frontend:/app
      - frontend_node_modules:/app/node_modules
    depends_on:
      - backend

volumes:
  backend_h2_data:
  maven_cache:
  frontend_node_modules: