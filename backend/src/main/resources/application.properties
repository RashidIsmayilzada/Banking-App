spring.application.name=banking-app
server.servlet.context-path=/api
spring.datasource.url=jdbc:h2:file:${H2_DB_PATH:/app/data/bankingdb}
spring.datasource.driver-class-name=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=

spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.H2Dialect

spring.h2.console.enabled=true
spring.h2.console.path=/h2-console

springdoc.swagger-ui.enabled=true
springdoc.swagger-ui.path=/swagger-ui.html
springdoc.swagger-ui.url=/openapi/openapi.yaml
#springdoc.swagger-ui.disable-swagger-default-url=true
springdoc.api-docs.enabled=true
springdoc.api-docs.path=/v3/api-docs

server.address=0.0.0.0

jwt.secret=${JWT_SECRET:fS3LS/acbeMlUfl4NG087Xn/lMJgaQH+Yag5kwLr0u8=}
jwt.expiration-ms=${JWT_EXPIRATION_MS:3600000}
