spring.application.name=banking-app
server.servlet.context-path=/api
spring.datasource.url=jdbc:h2:file:${H2_DB_PATH:./data/bankingdb}
spring.datasource.driver-class-name=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=

spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true

# Accept lowercase enum values in request bodies (e.g. status "approved" -> APPROVED)
spring.jackson.mapper.accept-case-insensitive-enums=true
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.H2Dialect

spring.h2.console.enabled=true
spring.h2.console.path=/h2-console

springdoc.swagger-ui.enabled=${SWAGGER_ENABLED:true}
springdoc.swagger-ui.path=/swagger-ui.html
springdoc.swagger-ui.url=/openapi/openapi.yaml
springdoc.swagger-ui.persist-authorization=true
springdoc.api-docs.enabled=true
springdoc.api-docs.path=/v3/api-docs

server.address=0.0.0.0
server.port=${PORT:8080}

# Falls back to a local-dev-only secret when JWT_SECRET is not set (e.g. running locally).
# Production MUST set the JWT_SECRET env var, which overrides this default.
jwt.secret=${JWT_SECRET:dGVzdFNlY3JldEtleUZvckxvY2FsRGV2ZWxvcG1lbnRPbmx5MTIzNA==}
jwt.expiration-ms=${JWT_EXPIRATION_MS:3600000}

cors.allowed-origins=${CORS_ALLOWED_ORIGINS:http://localhost:5173}


