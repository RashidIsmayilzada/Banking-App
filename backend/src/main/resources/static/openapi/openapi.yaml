openapi: 3.1.0
info:
  title: Banking App API
  version: 2.0.0
  summary: Role-neutral, resource-based OpenAPI specification.
  description: |
    All endpoints are role-neutral: the URL never encodes who is calling.
    The JWT role determines access scope and what data is returned or allowed.

    Consolidated from 22 endpoints to 12:
    - One registration endpoint (POST /users, role in body)
    - One transaction endpoint for reads and one for writes
    - ATM sessions handled via POST /auth/login with channel=ATM
    - Account limits and closure via a single PATCH /accounts/{accountId}
servers:
  - url: http://localhost:8080/api
    description: Local Docker or local backend runtime
tags:
  - name: Authentication
  - name: Users
  - name: Accounts
  - name: Transactions
paths:
  /auth/login:
    $ref: ./paths/auth.yaml#/login
  /auth/logout:
    $ref: ./paths/auth.yaml#/logout
  /users:
    $ref: ./paths/users.yaml#/users
  /users/{id}:
    $ref: ./paths/users.yaml#/userById
  /accounts:
    $ref: ./paths/accounts.yaml#/accounts
  /accounts/{accountId}:
    $ref: ./paths/accounts.yaml#/accountById
  /transactions:
    $ref: ./paths/transactions.yaml#/transactions
components:
  securitySchemes:
    bearerAuth:
      $ref: ./components/schemas/common.yaml#/bearerAuth
  parameters:
    AccountId:
      $ref: ./components/schemas/common.yaml#/AccountId
    UserId:
      $ref: ./components/schemas/common.yaml#/UserId
    Page:
      $ref: ./components/schemas/common.yaml#/Page
    Size:
      $ref: ./components/schemas/common.yaml#/Size
    Sort:
      $ref: ./components/schemas/common.yaml#/Sort
    StartDateTime:
      $ref: ./components/schemas/common.yaml#/StartDateTime
    EndDateTime:
      $ref: ./components/schemas/common.yaml#/EndDateTime
    AmountMin:
      $ref: ./components/schemas/common.yaml#/AmountMin
    AmountMax:
      $ref: ./components/schemas/common.yaml#/AmountMax
    Iban:
      $ref: ./components/schemas/common.yaml#/Iban
  responses:
    BadRequest:
      $ref: ./components/schemas/common.yaml#/BadRequest
    Unauthorized:
      $ref: ./components/schemas/common.yaml#/Unauthorized
    Forbidden:
      $ref: ./components/schemas/common.yaml#/Forbidden
    NotFound:
      $ref: ./components/schemas/common.yaml#/NotFound
    Conflict:
      $ref: ./components/schemas/common.yaml#/Conflict
    ValidationError:
      $ref: ./components/schemas/common.yaml#/ValidationError
  schemas:
    ErrorResponse:
      $ref: ./components/schemas/common.yaml#/ErrorResponse
    ValidationErrorResponse:
      $ref: ./components/schemas/common.yaml#/ValidationErrorResponse
    FieldViolation:
      $ref: ./components/schemas/common.yaml#/FieldViolation
    PageMetadata:
      $ref: ./components/schemas/common.yaml#/PageMetadata
    Role:
      $ref: ./components/schemas/common.yaml#/Role
    UserStatus:
      $ref: ./components/schemas/common.yaml#/UserStatus
    AccountStatus:
      $ref: ./components/schemas/common.yaml#/AccountStatus
    AccountType:
      $ref: ./components/schemas/common.yaml#/AccountType
    Channel:
      $ref: ./components/schemas/common.yaml#/Channel
    TransactionType:
      $ref: ./components/schemas/common.yaml#/TransactionType
    LoginRequest:
      $ref: ./components/schemas/auth.yaml#/LoginRequest
    LoginResponse:
      $ref: ./components/schemas/auth.yaml#/LoginResponse
    LogoutResponse:
      $ref: ./components/schemas/auth.yaml#/LogoutResponse
    AuthContext:
      $ref: ./components/schemas/auth.yaml#/AuthContext
    UserCreateRequest:
      $ref: ./components/schemas/users.yaml#/UserCreateRequest
    UserUpdateRequest:
      $ref: ./components/schemas/users.yaml#/UserUpdateRequest
    UserResponse:
      $ref: ./components/schemas/users.yaml#/UserResponse
    UserPage:
      $ref: ./components/schemas/users.yaml#/UserPage
    Account:
      $ref: ./components/schemas/accounts.yaml#/Account
    AccountTotals:
      $ref: ./components/schemas/accounts.yaml#/AccountTotals
    AccountListResponse:
      $ref: ./components/schemas/accounts.yaml#/AccountListResponse
    AccountUpdateRequest:
      $ref: ./components/schemas/accounts.yaml#/AccountUpdateRequest
    Money:
      $ref: ./components/schemas/transactions.yaml#/Money
    TransactionParty:
      $ref: ./components/schemas/transactions.yaml#/TransactionParty
    Transaction:
      $ref: ./components/schemas/transactions.yaml#/Transaction
    TransactionPage:
      $ref: ./components/schemas/transactions.yaml#/TransactionPage
    TransactionRequest:
      $ref: ./components/schemas/transactions.yaml#/TransactionRequest
    TransactionResult:
      $ref: ./components/schemas/transactions.yaml#/TransactionResult
