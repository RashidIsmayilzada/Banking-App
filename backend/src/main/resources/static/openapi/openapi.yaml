openapi: 3.1.0
info:
  title: Banking App API
  version: 1.0.0
  summary: Multi-file OpenAPI documentation aligned to the code-generation user stories.
  description: |
    This API contract is derived from:
    - the workbook `2526_code_generation_user_stories.xlsx`
    - the current Spring Boot domain model in this repository

    The user stories require:
    - complete Swagger/OpenAPI documentation
    - JWT-secured routes
    - customer registration and approval
    - customer and employee transfers
    - transaction history, filtering, and pagination
    - ATM login, deposit, and withdrawal flows
servers:
  - url: http://localhost:8080/api
    description: Local Docker or local backend runtime
tags:
  - name: Authentication
  - name: Customer Accounts
  - name: Customer Transfers
  - name: Customer Transactions
  - name: Employee Customers
  - name: Employee Transactions
  - name: ATM
paths:
  /auth/register/customer:
    $ref: ./paths/auth.yaml#/registerCustomer
  /auth/login:
    $ref: ./paths/auth.yaml#/login
  /auth/logout:
    $ref: ./paths/auth.yaml#/logout
  /auth/me:
    $ref: ./paths/auth.yaml#/me
  /customers/me/profile:
    $ref: ./paths/customer.yaml#/getMyProfile
  /customers/me/accounts:
    $ref: ./paths/customer.yaml#/listMyAccounts
  /customers/me/accounts/{accountId}:
    $ref: ./paths/customer.yaml#/getMyAccount
  /customers/iban-search:
    $ref: ./paths/customer.yaml#/searchCustomerIban
  /customers/me/transfers/internal:
    $ref: ./paths/customer.yaml#/createInternalTransfer
  /customers/me/transfers/external:
    $ref: ./paths/customer.yaml#/createExternalTransfer
  /customers/me/transactions:
    $ref: ./paths/customer.yaml#/listMyTransactions
  /employees/customers:
    $ref: ./paths/employee.yaml#/listCustomers
  /employees/customers/{customerUserId}/transactions:
    $ref: ./paths/employee.yaml#/listCustomerTransactions
  /employees/customers/{customerUserId}/approval:
    $ref: ./paths/employee.yaml#/approveCustomer
  /employees/accounts/{accountId}/limits:
    $ref: ./paths/employee.yaml#/updateAccountLimits
  /employees/accounts/{accountId}/close:
    $ref: ./paths/employee.yaml#/closeAccount
  /employees/transfers:
    $ref: ./paths/employee.yaml#/createEmployeeTransfer
  /employees/transactions:
    $ref: ./paths/employee.yaml#/listAllTransactions
  /atm/sessions:
    $ref: ./paths/atm.yaml#/startAtmSession
  /atm/sessions/{sessionId}:
    $ref: ./paths/atm.yaml#/endAtmSession
  /atm/transactions/deposits:
    $ref: ./paths/atm.yaml#/createAtmDeposit
  /atm/transactions/withdrawals:
    $ref: ./paths/atm.yaml#/createAtmWithdrawal
