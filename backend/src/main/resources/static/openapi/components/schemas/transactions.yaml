Money:
  type: object
  required:
    - amount
    - currency
  properties:
    amount:
      type: number
      format: double
    currency:
      type: string
      const: EUR

TransactionParty:
  type: object
  properties:
    iban:
      type: string
    name:
      type: string
    userId:
      type: integer
      format: int64

Transaction:
  type: object
  required:
    - transactionId
    - transactionType
    - amount
    - channel
    - initiatedByUserId
    - createdAt
    - description
  properties:
    transactionId:
      type: integer
      format: int64
    transactionType:
      $ref: ./common.yaml#/TransactionType
    amount:
      $ref: '#/Money'
    fromAccount:
      $ref: '#/TransactionParty'
    toAccount:
      $ref: '#/TransactionParty'
    channel:
      $ref: ./common.yaml#/Channel
    initiatedByUserId:
      type: integer
      format: int64
    createdAt:
      type: string
      format: date-time
    description:
      type: string

TransactionPage:
  type: object
  required:
    - items
    - page
  properties:
    items:
      type: array
      items:
        $ref: '#/Transaction'
    page:
      $ref: ./common.yaml#/PageMetadata

TransactionRequest:
  type: object
  required:
    - type
    - amount
    - description
  description: |
    Unified transaction request. Required fields vary by type:
    - TRANSFER: provide fromIban (source) and toIban (destination).
    - DEPOSIT / WITHDRAWAL: provide iban (ATM cash operations).
  properties:
    type:
      $ref: ./common.yaml#/TransactionType
    fromIban:
      type: string
      pattern: '^NL[0-9]{2}INHO0[0-9]{9}$'
      description: Required for TRANSFER (source account).
    toIban:
      type: string
      pattern: '^NL[0-9]{2}INHO0[0-9]{9}$'
      description: Required for TRANSFER (destination account).
    iban:
      type: string
      pattern: '^NL[0-9]{2}INHO0[0-9]{9}$'
      description: Required for DEPOSIT and WITHDRAWAL.
    amount:
      type: number
      format: double
      exclusiveMinimum: 0
    description:
      type: string
      maxLength: 255

TransferResult:
  type: object
  required:
    - transaction
    - sourceBalance
  properties:
    transaction:
      $ref: '#/Transaction'
    sourceBalance:
      $ref: '#/Money'
    destinationBalance:
      $ref: '#/Money'
