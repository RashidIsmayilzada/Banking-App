UserCreateRequest:
  type: object
  required:
    - firstName
    - lastName
    - email
    - username
    - password
    - bsn
    - phoneNumber
  properties:
    firstName:
      type: string
      maxLength: 100
    lastName:
      type: string
      maxLength: 100
    email:
      type: string
      format: email
      maxLength: 255
    username:
      type: string
      minLength: 3
      maxLength: 50
    password:
      type: string
      format: password
      minLength: 12
      maxLength: 128
    bsn:
      type: string
      pattern: '^[0-9]{9}$'
    phoneNumber:
      type: string
      maxLength: 20
    role:
      $ref: ./common.yaml#/Role
      description: Defaults to CUSTOMER if omitted.

UserApprovalRequest:
  type: object
  required:
    - status
  description: |
    Approval decision for a customer. When status is APPROVED the customer is
    activated and their default accounts are created with the optional limits
    below (defaults are used when omitted).
  properties:
    status:
      $ref: ./common.yaml#/CustomerStatus
    checkingAbsoluteLimit:
      type: number
      format: double
      description: Optional absolute (minimum balance) limit for the new checking account. May be negative for an overdraft.
    checkingDailyLimit:
      type: number
      format: double
      minimum: 0
      description: Optional daily transfer limit for the new checking account.
    savingsDailyLimit:
      type: number
      format: double
      minimum: 0
      description: Optional daily transfer limit for the new savings account.

UserResponse:
  type: object
  required:
    - id
    - firstName
    - lastName
    - email
    - username
    - role
    - status
    - registeredAt
  properties:
    id:
      type: integer
      format: int64
    firstName:
      type: string
    lastName:
      type: string
    email:
      type: string
      format: email
    username:
      type: string
    phoneNumber:
      type: string
    bsn:
      type: string
    role:
      $ref: ./common.yaml#/Role
    status:
      $ref: ./common.yaml#/UserStatus
    hasAccounts:
      type: boolean
    accountCount:
      type: integer
    combinedBalance:
      $ref: ./transactions.yaml#/Money
    registeredAt:
      type: string
      format: date-time

UserPage:
  type: object
  required:
    - items
    - page
  properties:
    items:
      type: array
      items:
        $ref: '#/UserResponse'
    page:
      $ref: ./common.yaml#/PageMetadata
