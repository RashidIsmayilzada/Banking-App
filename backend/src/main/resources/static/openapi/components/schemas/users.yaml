UserCreateRequest:
  type: object
  required:
    - firstName
    - lastName
    - email
    - username
    - password
    - bsn
    - phoneNumber
  properties:
    firstName:
      type: string
      maxLength: 100
    lastName:
      type: string
      maxLength: 100
    email:
      type: string
      format: email
      maxLength: 255
    username:
      type: string
      minLength: 3
      maxLength: 50
    password:
      type: string
      format: password
      minLength: 12
      maxLength: 128
    bsn:
      type: string
      pattern: '^[0-9]{9}$'
    phoneNumber:
      type: string
      maxLength: 20
    role:
      $ref: ./common.yaml#/Role
      description: Defaults to CUSTOMER if omitted.

UserUpdateRequest:
  type: object
  description: |
    All fields are optional. Customers may update their own profile fields.
    Employees may additionally set status (approval decision) and account limits
    which are applied when status is set to APPROVED.
  properties:
    firstName:
      type: string
      maxLength: 100
    lastName:
      type: string
      maxLength: 100
    phoneNumber:
      type: string
      maxLength: 20
    status:
      $ref: ./common.yaml#/UserStatus
    note:
      type: string
      maxLength: 4000
    checkingAbsoluteTransferLimit:
      type: number
      format: double
      minimum: 0
    checkingDailyTransferLimit:
      type: number
      format: double
      minimum: 0
    savingsAbsoluteTransferLimit:
      type: number
      format: double
      minimum: 0
    savingsDailyTransferLimit:
      type: number
      format: double
      minimum: 0

UserResponse:
  type: object
  required:
    - id
    - firstName
    - lastName
    - email
    - username
    - role
    - status
    - registeredAt
  properties:
    id:
      type: integer
      format: int64
    firstName:
      type: string
    lastName:
      type: string
    email:
      type: string
      format: email
    username:
      type: string
    phoneNumber:
      type: string
    bsn:
      type: string
    role:
      $ref: ./common.yaml#/Role
    status:
      $ref: ./common.yaml#/UserStatus
    hasAccounts:
      type: boolean
    accountCount:
      type: integer
    combinedBalance:
      $ref: ./transactions.yaml#/Money
    registeredAt:
      type: string
      format: date-time

UserPage:
  type: object
  required:
    - items
    - page
  properties:
    items:
      type: array
      items:
        $ref: '#/UserResponse'
    page:
      $ref: ./common.yaml#/PageMetadata
