CustomerRegistrationRequest:
  type: object
  required:
    - firstName
    - lastName
    - email
    - username
    - password
    - bsn
    - phoneNumber
  properties:
    firstName:
      type: string
      maxLength: 100
    lastName:
      type: string
      maxLength: 100
    email:
      type: string
      format: email
      maxLength: 255
    username:
      type: string
      minLength: 3
      maxLength: 50
    password:
      type: string
      format: password
      minLength: 12
      maxLength: 128
    bsn:
      type: string
      pattern: '^[0-9]{9}$'
    phoneNumber:
      type: string
      maxLength: 20
CustomerRegistrationResponse:
  type: object
  required:
    - userId
    - role
    - customerStatus
    - canAccessBankingFeatures
    - message
  properties:
    userId:
      type: integer
      format: int64
    role:
      $ref: ./common.yaml#/Role
    customerStatus:
      $ref: ./common.yaml#/CustomerStatus
    canAccessBankingFeatures:
      type: boolean
      example: false
    message:
      type: string
      example: Registration completed. Employee approval is required before bank accounts are created.
LoginRequest:
  type: object
  required:
    - identifier
    - password
  properties:
    identifier:
      type: string
      description: Email or username.
      maxLength: 255
    password:
      type: string
      format: password
      maxLength: 128
LoginResponse:
  type: object
  required:
    - accessToken
    - tokenType
    - expiresIn
    - user
  properties:
    accessToken:
      type: string
    tokenType:
      type: string
      const: Bearer
    expiresIn:
      type: integer
      format: int32
      example: 900
    user:
      $ref: '#/AuthContext'
LogoutResponse:
  type: object
  required:
    - message
  properties:
    message:
      type: string
      example: Logged out successfully.
AuthContext:
  type: object
  required:
    - userId
    - email
    - username
    - role
    - active
    - authorizedFeatures
  properties:
    userId:
      type: integer
      format: int64
    email:
      type: string
      format: email
    username:
      type: string
    role:
      $ref: ./common.yaml#/Role
    active:
      type: boolean
    lastLoginAt:
      type: string
      format: date-time
    customerStatus:
      $ref: ./common.yaml#/CustomerStatus
    employeeEnabled:
      type: boolean
    authorizedFeatures:
      type: array
      description: |
        Used to represent the customer-story requirement that a registered-but-not-approved
        customer can still log in but only see a basic welcome experience.
      items:
        type: string
        enum:
          - BASIC_WELCOME
          - CUSTOMER_BANKING
          - EMPLOYEE_BANKING
