CustomerRegistrationRequest:
  type: object
  required:
    - firstName
    - lastName
    - email
    - username
    - password
    - bsn
    - phoneNumber
  properties:
    firstName:
      type: string
      maxLength: 100
    lastName:
      type: string
      maxLength: 100
    email:
      type: string
      format: email
      maxLength: 255
    username:
      type: string
      minLength: 3
      maxLength: 50
    password:
      type: string
      format: password
      minLength: 8
      maxLength: 128
    bsn:
      type: string
      pattern: '^[0-9]{9}$'
    phoneNumber:
      type: string
      maxLength: 20

CustomerRegistrationResponse:
  type: object
  required:
    - id
    - email
    - username
    - role
    - status
  properties:
    id:
      type: integer
      format: int64
    email:
      type: string
      format: email
    username:
      type: string
    role:
      $ref: ./common.yaml#/Role
    status:
      $ref: ./common.yaml#/UserStatus
    registeredAt:
      type: string
      format: date-time

LoginRequest:
  type: object
  required:
    - email
    - password
  properties:
    email:
      type: string
      format: email
      maxLength: 255
    password:
      type: string
      format: password
      maxLength: 128
    channel:
      $ref: ./common.yaml#/Channel
      description: Defaults to WEB if omitted. Pass ATM to start an ATM session.
LoginResponse:
  type: object
  required:
    - accessToken
    - tokenType
    - expiresIn
    - user
  properties:
    accessToken:
      type: string
    tokenType:
      type: string
      const: Bearer
    expiresIn:
      type: integer
      format: int32
      example: 900
    user:
      $ref: '#/AuthContext'
LogoutResponse:
  type: object
  required:
    - message
  properties:
    message:
      type: string
      example: Logged out successfully.
AuthContext:
  type: object
  required:
    - userId
    - email
    - username
    - role
    - active
    - authorizedFeatures
  properties:
    userId:
      type: integer
      format: int64
    email:
      type: string
      format: email
    username:
      type: string
    role:
      $ref: ./common.yaml#/Role
    active:
      type: boolean
    lastLoginAt:
      type: string
      format: date-time
    userStatus:
      $ref: ./common.yaml#/UserStatus
    authorizedFeatures:
      type: array
      description: |
        Represents which features the authenticated user can access.
        A registered-but-not-approved customer sees only BASIC_WELCOME.
      items:
        type: string
        enum:
          - BASIC_WELCOME
          - CUSTOMER_BANKING
          - EMPLOYEE_BANKING
