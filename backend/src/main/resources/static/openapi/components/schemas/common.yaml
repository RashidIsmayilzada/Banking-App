bearerAuth:
  type: http
  scheme: bearer
  bearerFormat: JWT
  description: JWT access token used for all authenticated HTTP API requests.
atmSessionAuth:
  type: apiKey
  in: header
  name: X-ATM-Session-Token
  description: Opaque token representing an authenticated ATM session.

AccountId:
  name: accountId
  in: path
  required: true
  schema:
    type: integer
    format: int64
    minimum: 1
CustomerUserId:
  name: customerUserId
  in: path
  required: true
  schema:
    type: integer
    format: int64
    minimum: 1
SessionId:
  name: sessionId
  in: path
  required: true
  schema:
    type: integer
    format: int64
    minimum: 1
Page:
  name: page
  in: query
  required: false
  schema:
    type: integer
    minimum: 0
    default: 0
Size:
  name: size
  in: query
  required: false
  schema:
    type: integer
    minimum: 1
    maximum: 100
    default: 20
Sort:
  name: sort
  in: query
  required: false
  schema:
    type: string
    example: createdAt,desc
StartDateTime:
  name: startDateTime
  in: query
  required: false
  schema:
    type: string
    format: date-time
EndDateTime:
  name: endDateTime
  in: query
  required: false
  schema:
    type: string
    format: date-time
AmountMin:
  name: amountMin
  in: query
  required: false
  schema:
    type: number
    format: double
    minimum: 0
AmountMax:
  name: amountMax
  in: query
  required: false
  schema:
    type: number
    format: double
    minimum: 0
Iban:
  name: iban
  in: query
  required: false
  schema:
    type: string
    pattern: '^NL[0-9]{2}INHO0[0-9]{9}$'

BadRequest:
  description: The request could not be processed.
  content:
    application/json:
      schema:
        $ref: '#/ErrorResponse'
Unauthorized:
  description: Authentication is missing or invalid.
  content:
    application/json:
      schema:
        $ref: '#/ErrorResponse'
Forbidden:
  description: The authenticated principal is not allowed to perform this action.
  content:
    application/json:
      schema:
        $ref: '#/ErrorResponse'
NotFound:
  description: The requested resource was not found.
  content:
    application/json:
      schema:
        $ref: '#/ErrorResponse'
Conflict:
  description: The request conflicts with current state.
  content:
    application/json:
      schema:
        $ref: '#/ErrorResponse'
ValidationError:
  description: Input validation failed.
  content:
    application/json:
      schema:
        $ref: '#/ValidationErrorResponse'

ErrorResponse:
  type: object
  required:
    - code
    - message
    - timestamp
  properties:
    code:
      type: string
    message:
      type: string
    correlationId:
      type: string
    timestamp:
      type: string
      format: date-time
ValidationErrorResponse:
  allOf:
    - $ref: '#/ErrorResponse'
    - type: object
      required:
        - errors
      properties:
        errors:
          type: array
          items:
            $ref: '#/FieldViolation'
FieldViolation:
  type: object
  required:
    - field
    - message
  properties:
    field:
      type: string
    message:
      type: string
PageMetadata:
  type: object
  required:
    - page
    - size
    - totalElements
    - totalPages
  properties:
    page:
      type: integer
    size:
      type: integer
    totalElements:
      type: integer
      format: int64
    totalPages:
      type: integer

Role:
  type: string
  enum: [CUSTOMER, EMPLOYEE]
CustomerStatus:
  type: string
  enum: [PENDING_APPROVAL, APPROVED, REJECTED, CLOSED]
ApprovalDecision:
  type: string
  enum: [APPROVED, REJECTED]
AccountType:
  type: string
  enum: [CHECKING, SAVINGS]
Channel:
  type: string
  enum: [WEB, ATM, EMPLOYEE]
TransactionType:
  type: string
  enum: [TRANSFER, DEPOSIT, WITHDRAWAL]
