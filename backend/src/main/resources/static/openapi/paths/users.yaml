users:
  post:
    tags: [Users]
    summary: Create a new user. Role defaults to CUSTOMER if omitted (self-registration).
    operationId: createUser
    security: []
    requestBody:
      required: true
      content:
        application/json:
          schema:
            $ref: ../components/schemas/users.yaml#/UserCreateRequest
    responses:
      '201':
        description: User created.
        content:
          application/json:
            schema:
              $ref: ../components/schemas/users.yaml#/UserResponse
      '409':
        $ref: ../components/schemas/common.yaml#/Conflict
      '422':
        $ref: ../components/schemas/common.yaml#/ValidationError
  get:
    tags: [Users]
    summary: List users. Employees only. Filter by role, status, name, or account presence.
    operationId: listUsers
    security:
      - bearerAuth: []
    parameters:
      - $ref: ../components/schemas/common.yaml#/Page
      - $ref: ../components/schemas/common.yaml#/Size
      - $ref: ../components/schemas/common.yaml#/Sort
      - name: role
        in: query
        required: false
        schema:
          $ref: ../components/schemas/common.yaml#/Role
      - name: status
        in: query
        required: false
        schema:
          $ref: ../components/schemas/common.yaml#/UserStatus
      - name: hasAccounts
        in: query
        required: false
        schema:
          type: boolean
      - name: firstName
        in: query
        required: false
        schema:
          type: string
      - name: lastName
        in: query
        required: false
        schema:
          type: string
      - name: q
        in: query
        required: false
        schema:
          type: string
    responses:
      '200':
        description: User page returned.
        content:
          application/json:
            schema:
              $ref: ../components/schemas/users.yaml#/UserPage
      '401':
        $ref: ../components/schemas/common.yaml#/Unauthorized
      '403':
        $ref: ../components/schemas/common.yaml#/Forbidden

userById:
  get:
    tags: [Users]
    summary: Get a user by ID. Customers may only fetch their own ID.
    operationId: getUser
    security:
      - bearerAuth: []
    parameters:
      - $ref: ../components/schemas/common.yaml#/UserId
    responses:
      '200':
        description: User returned.
        content:
          application/json:
            schema:
              $ref: ../components/schemas/users.yaml#/UserResponse
      '401':
        $ref: ../components/schemas/common.yaml#/Unauthorized
      '403':
        $ref: ../components/schemas/common.yaml#/Forbidden
      '404':
        $ref: ../components/schemas/common.yaml#/NotFound
userApproval:
  patch:
    tags: [Users]
    summary: Approve or reject a customer. Employees only.
    description: >
      Sets the customer approval status (APPROVED / REJECTED / CLOSED). When the
      status moves to APPROVED, the customer is activated and their default
      CHECKING and SAVINGS accounts are created with optional daily limits.
    operationId: approveUser
    security:
      - bearerAuth: []
    parameters:
      - $ref: ../components/schemas/common.yaml#/UserId
    requestBody:
      required: true
      content:
        application/json:
          schema:
            $ref: ../components/schemas/users.yaml#/UserApprovalRequest
    responses:
      '200':
        description: Status updated; updated user returned.
        content:
          application/json:
            schema:
              $ref: ../components/schemas/users.yaml#/UserResponse
      '401':
        $ref: ../components/schemas/common.yaml#/Unauthorized
      '403':
        $ref: ../components/schemas/common.yaml#/Forbidden
      '404':
        $ref: ../components/schemas/common.yaml#/NotFound
      '422':
        $ref: ../components/schemas/common.yaml#/ValidationError

userClose:
  patch:
    tags: [Users]
    summary: Close a user. Employees only.
    description: >
      For customers: sets the profile to CLOSED and closes all of their accounts.
      For employees: deactivates the employee (active=false).
    operationId: closeUser
    security:
      - bearerAuth: []
    parameters:
      - $ref: ../components/schemas/common.yaml#/UserId
    responses:
      '200':
        description: User closed; updated user returned.
        content:
          application/json:
            schema:
              $ref: ../components/schemas/users.yaml#/UserResponse
      '401':
        $ref: ../components/schemas/common.yaml#/Unauthorized
      '403':
        $ref: ../components/schemas/common.yaml#/Forbidden
      '404':
        $ref: ../components/schemas/common.yaml#/NotFound

userReopen:
  patch:
    tags: [Users]
    summary: Reopen a closed user. Employees only.
    description: >
      For customers: sets the profile back to APPROVED and reactivates all of
      their accounts. For employees: reactivates the employee (active=true).
    operationId: reopenUser
    security:
      - bearerAuth: []
    parameters:
      - $ref: ../components/schemas/common.yaml#/UserId
    responses:
      '200':
        description: User reopened; updated user returned.
        content:
          application/json:
            schema:
              $ref: ../components/schemas/users.yaml#/UserResponse
      '401':
        $ref: ../components/schemas/common.yaml#/Unauthorized
      '403':
        $ref: ../components/schemas/common.yaml#/Forbidden
      '404':
        $ref: ../components/schemas/common.yaml#/NotFound
