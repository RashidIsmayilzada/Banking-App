users:
  post:
    tags: [Users]
    summary: Create a new user. Role defaults to CUSTOMER if omitted (self-registration).
    operationId: createUser
    security: []
    requestBody:
      required: true
      content:
        application/json:
          schema:
            $ref: ../components/schemas/users.yaml#/UserCreateRequest
    responses:
      '201':
        description: User created.
        content:
          application/json:
            schema:
              $ref: ../components/schemas/users.yaml#/UserResponse
      '409':
        $ref: ../components/schemas/common.yaml#/Conflict
      '422':
        $ref: ../components/schemas/common.yaml#/ValidationError
  get:
    tags: [Users]
    summary: List users. Employees only. Filter by role, status, name, or account presence.
    operationId: listUsers
    security:
      - bearerAuth: []
    parameters:
      - $ref: ../components/schemas/common.yaml#/Page
      - $ref: ../components/schemas/common.yaml#/Size
      - $ref: ../components/schemas/common.yaml#/Sort
      - name: role
        in: query
        required: false
        schema:
          $ref: ../components/schemas/common.yaml#/Role
      - name: status
        in: query
        required: false
        schema:
          $ref: ../components/schemas/common.yaml#/UserStatus
      - name: hasAccounts
        in: query
        required: false
        schema:
          type: boolean
      - name: firstName
        in: query
        required: false
        schema:
          type: string
      - name: lastName
        in: query
        required: false
        schema:
          type: string
      - name: q
        in: query
        required: false
        schema:
          type: string
    responses:
      '200':
        description: User page returned.
        content:
          application/json:
            schema:
              $ref: ../components/schemas/users.yaml#/UserPage
      '401':
        $ref: ../components/schemas/common.yaml#/Unauthorized
      '403':
        $ref: ../components/schemas/common.yaml#/Forbidden

userById:
  get:
    tags: [Users]
    summary: Get a user by ID. Customers may only fetch their own ID.
    operationId: getUser
    security:
      - bearerAuth: []
    parameters:
      - $ref: ../components/schemas/common.yaml#/UserId
    responses:
      '200':
        description: User returned.
        content:
          application/json:
            schema:
              $ref: ../components/schemas/users.yaml#/UserResponse
      '401':
        $ref: ../components/schemas/common.yaml#/Unauthorized
      '403':
        $ref: ../components/schemas/common.yaml#/Forbidden
      '404':
        $ref: ../components/schemas/common.yaml#/NotFound
  patch:
    tags: [Users]
    summary: Update a user's profile or status. Employees may set status and approval limits.
    operationId: updateUser
    security:
      - bearerAuth: []
    parameters:
      - $ref: ../components/schemas/common.yaml#/UserId
    requestBody:
      required: true
      content:
        application/json:
          schema:
            $ref: ../components/schemas/users.yaml#/UserUpdateRequest
    responses:
      '200':
        description: Updated user returned.
        content:
          application/json:
            schema:
              $ref: ../components/schemas/users.yaml#/UserResponse
      '401':
        $ref: ../components/schemas/common.yaml#/Unauthorized
      '403':
        $ref: ../components/schemas/common.yaml#/Forbidden
      '404':
        $ref: ../components/schemas/common.yaml#/NotFound
      '409':
        $ref: ../components/schemas/common.yaml#/Conflict
      '422':
        $ref: ../components/schemas/common.yaml#/ValidationError
  delete:
    tags: [Users]
    summary: Delete a user. Employees only.
    operationId: deleteUser
    security:
      - bearerAuth: []
    parameters:
      - $ref: ../components/schemas/common.yaml#/UserId
    responses:
      '204':
        description: User deleted.
      '401':
        $ref: ../components/schemas/common.yaml#/Unauthorized
      '403':
        $ref: ../components/schemas/common.yaml#/Forbidden
      '404':
        $ref: ../components/schemas/common.yaml#/NotFound
