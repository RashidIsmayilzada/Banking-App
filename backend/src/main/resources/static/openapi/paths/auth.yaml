login:
  post:
    tags: [Authentication]
    summary: Authenticate and receive a JWT. Pass channel=ATM to start an ATM session.
    operationId: login
    security: []
    requestBody:
      required: true
      content:
        application/json:
          schema:
            $ref: ../components/schemas/auth.yaml#/LoginRequest
    responses:
      '200':
        description: Login succeeded.
        content:
          application/json:
            schema:
              $ref: ../components/schemas/auth.yaml#/LoginResponse
      '401':
        $ref: ../components/schemas/common.yaml#/Unauthorized
      '403':
        description: The user exists but is not allowed to access the application.
        content:
          application/json:
            schema:
              $ref: ../components/schemas/common.yaml#/ErrorResponse

logout:
  post:
    tags: [Authentication]
    summary: Invalidate the current session (web or ATM)
    operationId: logout
    security:
      - bearerAuth: []
    responses:
      '200':
        description: Logout completed.
        content:
          application/json:
            schema:
              $ref: ../components/schemas/auth.yaml#/LogoutResponse
      '401':
        $ref: ../components/schemas/common.yaml#/Unauthorized
